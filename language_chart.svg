<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#010409"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" rx="16" fill="url(#bg)" stroke="#1a1f2b" stroke-width="1"/>

  <!-- Title -->
  <text x="300" y="36" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">Language Usage</text>

  <!-- Donut: center 180,215  r=120  circ=753.98 -->

  <!-- Background ring -->
  <circle cx="180" cy="215" r="120" fill="none" stroke="#161b22" stroke-width="36"/>

  <!-- Python 33% => 248.8 | offset 0 -->
  <circle cx="180" cy="215" r="120" fill="none" stroke="#3776AB" stroke-width="36"
    stroke-dasharray="248.8 505.18" stroke-dashoffset="0"
    transform="rotate(-90 180 215)" filter="url(#glow)" opacity="0.95">
    <animate attributeName="stroke-dasharray" from="0 753.98" to="248.8 505.18" dur="0.8s" fill="freeze"/>
  </circle>

  <!-- Lua 23% => 173.4 | offset -248.8 -->
  <circle cx="180" cy="215" r="120" fill="none" stroke="#2C2D72" stroke-width="36"
    stroke-dasharray="173.4 580.58" stroke-dashoffset="-248.8"
    transform="rotate(-90 180 215)" filter="url(#glow)" opacity="0.95">
    <animate attributeName="stroke-dasharray" from="0 753.98" to="173.4 580.58" dur="0.9s" fill="freeze"/>
  </circle>

  <!-- Rust 18% => 135.7 | offset -422.2 -->
  <circle cx="180" cy="215" r="120" fill="none" stroke="#dea584" stroke-width="36"
    stroke-dasharray="135.7 618.28" stroke-dashoffset="-422.2"
    transform="rotate(-90 180 215)" filter="url(#glow)" opacity="0.95">
    <animate attributeName="stroke-dasharray" from="0 753.98" to="135.7 618.28" dur="1.0s" fill="freeze"/>
  </circle>

  <!-- C++ 14% => 105.6 | offset -557.9 -->
  <circle cx="180" cy="215" r="120" fill="none" stroke="#00599C" stroke-width="36"
    stroke-dasharray="105.6 648.38" stroke-dashoffset="-557.9"
    transform="rotate(-90 180 215)" filter="url(#glow)" opacity="0.95">
    <animate attributeName="stroke-dasharray" from="0 753.98" to="105.6 648.38" dur="1.1s" fill="freeze"/>
  </circle>

  <!-- JavaScript 5% => 37.7 | offset -663.5 -->
  <circle cx="180" cy="215" r="120" fill="none" stroke="#F7DF1E" stroke-width="36"
    stroke-dasharray="37.7 716.28" stroke-dashoffset="-663.5"
    transform="rotate(-90 180 215)" filter="url(#glow)" opacity="0.95">
    <animate attributeName="stroke-dasharray" from="0 753.98" to="37.7 716.28" dur="1.2s" fill="freeze"/>
  </circle>

  <!-- TypeScript 3% => 22.6 | offset -701.2 -->
  <circle cx="180" cy="215" r="120" fill="none" stroke="#007ACC" stroke-width="36"
    stroke-dasharray="22.6 731.38" stroke-dashoffset="-701.2"
    transform="rotate(-90 180 215)" filter="url(#glow)" opacity="0.95">
    <animate attributeName="stroke-dasharray" from="0 753.98" to="22.6 731.38" dur="1.3s" fill="freeze"/>
  </circle>

  <!-- HTML/CSS 4% => 30.2 | offset -723.8 -->
  <circle cx="180" cy="215" r="120" fill="none" stroke="#E34F26" stroke-width="36"
    stroke-dasharray="30.2 723.78" stroke-dashoffset="-723.8"
    transform="rotate(-90 180 215)" filter="url(#glow)" opacity="0.95">
    <animate attributeName="stroke-dasharray" from="0 753.98" to="30.2 723.78" dur="1.4s" fill="freeze"/>
  </circle>

  <!-- Center text -->
  <text x="180" y="210" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700">7</text>
  <text x="180" y="232" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="11">languages</text>

  <!-- Legend -->
  <rect x="340" y="82" width="12" height="12" rx="3" fill="#3776AB"/>
  <text x="360" y="93" fill="#d0d7de" font-family="Segoe UI, sans-serif" font-size="13">Python  ❤️</text>
  <text x="540" y="93" text-anchor="end" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="12">33%</text>

  <rect x="340" y="116" width="12" height="12" rx="3" fill="#2C2D72"/>
  <text x="360" y="127" fill="#d0d7de" font-family="Segoe UI, sans-serif" font-size="13">Lua  ❤️</text>
  <text x="540" y="127" text-anchor="end" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="12">23%</text>

  <rect x="340" y="150" width="12" height="12" rx="3" fill="#dea584"/>
  <text x="360" y="161" fill="#d0d7de" font-family="Segoe UI, sans-serif" font-size="13">Rust  ❤️</text>
  <text x="540" y="161" text-anchor="end" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="12">18%</text>

  <rect x="340" y="184" width="12" height="12" rx="3" fill="#00599C"/>
  <text x="360" y="195" fill="#d0d7de" font-family="Segoe UI, sans-serif" font-size="13">C++</text>
  <text x="540" y="195" text-anchor="end" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="12">14%</text>

  <rect x="340" y="218" width="12" height="12" rx="3" fill="#F7DF1E"/>
  <text x="360" y="229" fill="#d0d7de" font-family="Segoe UI, sans-serif" font-size="13">JavaScript</text>
  <text x="540" y="229" text-anchor="end" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="12">5%</text>

  <rect x="340" y="252" width="12" height="12" rx="3" fill="#007ACC"/>
  <text x="360" y="263" fill="#d0d7de" font-family="Segoe UI, sans-serif" font-size="13">TypeScript</text>
  <text x="540" y="263" text-anchor="end" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="12">3%</text>

  <rect x="340" y="286" width="12" height="12" rx="3" fill="#E34F26"/>
  <text x="360" y="297" fill="#d0d7de" font-family="Segoe UI, sans-serif" font-size="13">HTML / CSS</text>
  <text x="540" y="297" text-anchor="end" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="12">4%</text>

  <!-- Footer -->
  <line x1="40" y1="370" x2="560" y2="370" stroke="#1a1f2b" stroke-width="1"/>
  <text x="300" y="390" text-anchor="middle" fill="#6e7681" font-family="Segoe UI, sans-serif" font-size="10">752.dev — language distribution</text>
</svg>
