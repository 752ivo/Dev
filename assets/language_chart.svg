        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"></stop>
      <stop offset="100%" stop-color="#010409"></stop>
    </linearGradient>
  </defs>

  
