<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 60" width="160" height="60">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Chat bubble -->
  <rect x="10" y="5" width="140" height="38" rx="19" fill="#1a1f2b"/>
  <!-- Bubble tail -->
  <polygon points="30,43 40,43 25,55" fill="#1a1f2b"/>

  <!-- Animated text cycling :/ and Hi... -->
  <text x="80" y="30" text-anchor="middle" fill="#d0d7de" font-family="Fira Code, Consolas, monospace" font-size="16" font-weight="500">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.45;0.5;1" dur="5s" repeatCount="indefinite"/>
    :/
  </text>
  <text x="80" y="30" text-anchor="middle" fill="#d0d7de" font-family="Fira Code, Consolas, monospace" font-size="16" font-weight="500">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.45;0.5;1" dur="5s" repeatCount="indefinite"/>
    Hi...
  </text>
</svg>
